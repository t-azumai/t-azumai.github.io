<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アプリストアへ移動中...</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      padding: 20px;
    }

    .message {
      font-size: 18px;
      color: #333;
      margin-bottom: 8px;
    }

    .sub-message {
      font-size: 14px;
      color: #888;
      margin-bottom: 32px;
    }

    .store-buttons {
      display: flex;
      align-items: center;
      gap: 16px;
      max-width: 100%;
      flex-wrap: wrap;
      justify-content: center;
    }

    .store-buttons a {
      display: block;
      height: 100px;
      min-width: 0;
      flex-shrink: 1;
    }

    .store-buttons a.app-store {
      padding: 12px 0;
    }

    .store-buttons a img {
      height: 100%;
      object-fit: contain;
    }
  </style>
  <script>
    window.onload = function () {
      var userAgent = navigator.userAgent || navigator.vendor || window.opera;
      if (/android/i.test(userAgent)) {
        window.location.href = "https://play.google.com/store/apps/details?id=jp.co.ucc.coffeecreation";
      } else {
        window.location.href = "https://apps.apple.com/jp/app/id6461723167";
      }
    };
  </script>
</head>

<body>

  <div class="container">
    <p class="message">アプリストアへ移動中...</p>
    <p class="sub-message">自動で遷移しない場合は、下のボタンを押してください。</p>
    <div class="store-buttons">
      <a class="app-store"
        href="https://apps.apple.com/jp/app/coffee-creation-ucc%E5%85%AC%E5%BC%8F%E3%82%A2%E3%83%97%E3%83%AA/id6461723167?itscg=30200&itsct=apps_box_badge&mttnsubad=6461723167">
        <img
          src="https://toolbox.marketingtools.apple.com/api/v2/badges/download-on-the-app-store/black/ja-jp?releaseDate=1695513600"
          alt="App Storeでダウンロード" />
      </a>
      <a href="https://play.google.com/store/apps/details?id=jp.co.ucc.coffeecreation">
        <img src="https://play.google.com/intl/en_us/badges/static/images/badges/ja_badge_web_generic.png"
          alt="Google Playでダウンロード" />
      </a>
    </div>
  </div>

</body>

</html>
